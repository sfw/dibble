# Adaptive K-12 Learning Platform - Local Development Stack
# Docker Compose for local development and testing
# 
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose logs -f            # Follow logs
#   docker-compose down -v            # Stop and remove volumes
#   docker-compose --profile ml up -d # Start with ML services

version: '3.9'

services:
  # =============================================================================
  # API GATEWAY & FRONTEND
  # =============================================================================
  
  api-gateway:
    build:
      context: ../backend/api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - JWT_SECRET=dev-jwt-secret-change-in-production
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/adaptive_platform
      - NEO4J_URL=bolt://neo4j:7687
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - adaptive-network
    volumes:
      - ../backend/api-gateway:/app
      - /app/node_modules

  web-frontend:
    build:
      context: ../frontend/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/v1
      - NODE_ENV=development
    depends_on:
      - api-gateway
    networks:
      - adaptive-network
    volumes:
      - ../frontend/web:/app
      - /app/node_modules

  # =============================================================================
  # CORE SERVICES
  # =============================================================================
  
  personalization-engine:
    build:
      context: ../backend/personalization-engine
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - NEO4J_URL=bolt://neo4j:7687
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/adaptive_platform
      - TRITON_URL=http://triton:8000
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started
      triton:
        condition: service_started
    networks:
      - adaptive-network
    deploy:
      replicas: 2

  assessment-engine:
    build:
      context: ../backend/assessment-engine
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    environment:
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/adaptive_platform
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - adaptive-network

  analytics-service:
    build:
      context: ../backend/analytics
      dockerfile: Dockerfile
    ports:
      - "8083:8080"
    environment:
      - CASSANDRA_HOSTS=cassandra
      - CASSANDRA_KEYSPACE=adaptive_analytics
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      cassandra:
        condition: service_healthy
    networks:
      - adaptive-network

  notification-service:
    build:
      context: ../backend/notifications
      dockerfile: Dockerfile
    environment:
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - KAFKA_BROKERS=kafka:9092
    ports:
      - "8084:8080"
    depends_on:
      kafka:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - adaptive-network

  # =============================================================================
  # DATA STORES
  # =============================================================================
  
  postgres:
    image: postgres:14-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=adaptive_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    networks:
      - adaptive-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.13-community
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc", "gds"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - adaptive-network
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - adaptive-network
    command: redis-server --appendonly yes

  cassandra:
    image: cassandra:4.1
    environment:
      - CASSANDRA_CLUSTER_NAME=AdaptiveAnalytics
      - CASSANDRA_DC=DC1
      - CASSANDRA_RACK=Rack1
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - adaptive-network
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 5

  # =============================================================================
  # MESSAGE QUEUE
  # =============================================================================
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - adaptive-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - adaptive-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.5.0
    depends_on:
      - kafka
      - postgres
    ports:
      - "8085:8083"
    environment:
      - CONNECT_BOOTSTRAP_SERVERS=kafka:29092
      - CONNECT_GROUP_ID=connect-cluster
      - CONNECT_CONFIG_STORAGE_TOPIC=connect-configs
      - CONNECT_OFFSET_STORAGE_TOPIC=connect-offsets
      - CONNECT_STATUS_STORAGE_TOPIC=connect-status
      - CONNECT_KEY_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - CONNECT_VALUE_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - CONNECT_INTERNAL_KEY_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - CONNECT_INTERNAL_VALUE_CONVERTER=org.apache.kafka.connect.json.JsonConverter
    networks:
      - adaptive-network

  # =============================================================================
  # ML INFERENCE (GPU-enabled profile)
  # =============================================================================
  
  triton:
    image: nvcr.io/nvidia/tritonserver:23.10-py3
    profiles:
      - ml
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ../ml-models:/models:ro
    command: tritonserver --model-repository=/models --model-control-mode=explicit
    networks:
      - adaptive-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ml-training:
    build:
      context: ../ml/training
      dockerfile: Dockerfile
      target: training
    profiles:
      - ml
      - training
    environment:
      - NEO4J_URL=bolt://neo4j:7687
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/adaptive_platform
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ../ml/training:/workspace
      - mlflow_artifacts:/mlflow
    networks:
      - adaptive-network

  mlflow:
    image: mlflow/mlflow:v2.8.0
    profiles:
      - ml
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_TRACKING_URI=sqlite:///mlflow.db
    volumes:
      - mlflow_artifacts:/mlflow
    networks:
      - adaptive-network

  # =============================================================================
  # OBSERVABILITY
  # =============================================================================
  
  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - adaptive-network

  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - adaptive-network

  jaeger:
    image: jaegertracing/all-in-one:1.50
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - adaptive-network

  # =============================================================================
  # DEVELOPMENT TOOLS
  # =============================================================================
  
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - adaptive-network

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@platform.edu
      - PGADMIN_DEFAULT_PASSWORD=admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - adaptive-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    networks:
      - adaptive-network

networks:
  adaptive-network:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  cassandra_data:
  zookeeper_data:
  kafka_data:
  prometheus_data:
  grafana_data:
  pgadmin_data:
  mlflow_artifacts:
